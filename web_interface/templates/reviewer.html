{% extends "base.html" %}
{% block title %}Interactive Reviewer{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css">
<style>
    .reviewer-layout { display: flex; flex-direction: column; gap: 1rem; min-height: calc(100vh - 180px); }
    .criteria-bar { display: flex; gap: 0.5rem; overflow-x: auto; padding: 0.5rem; background: white; border-radius: 8px; border: 1px solid #ddd; flex-shrink: 0; }
    .criteria-bar-item { 
        padding: 0.5rem 1rem; 
        border-radius: 4px; 
        cursor: pointer; 
        border: 1px solid #ddd; 
        white-space: nowrap;
        font-size: 0.85rem;
        flex-shrink: 0;
    }
    .criteria-bar-item:hover { background: #f0f0f0; }
    .criteria-bar-item.active { background: #3498db; color: white; border-color: #2980b9; }
    .main-content { display: flex; gap: 1rem; flex: 1; min-height: 0; }
    .code-section { flex: 4; display: flex; flex-direction: column; min-width: 0; }
    .right-section { flex: 1; display: flex; flex-direction: column; gap: 1rem; min-width: 260px; max-width: 320px; }
    .code-panel { background: white; border: 1px solid #ddd; border-radius: 8px; overflow: hidden; flex: 1; min-height: 400px; }
    .code-panel pre { margin: 0; padding: 1rem; background: white !important; overflow: auto; max-height: 100%; }
    .code-panel code { font-family: 'Consolas', 'Monaco', 'Courier New', monospace; font-size: 0.85rem; line-height: 1.5; }
    .code-header { background: #f8f9fa; padding: 0.5rem 1rem; border-bottom: 1px solid #ddd; display: flex; justify-content: space-between; flex-shrink: 0; }
    .nav-bar { display: flex; gap: 1rem; align-items: center; margin-bottom: 1rem; flex-wrap: wrap; justify-content: space-between; }
    .nav-info { display: flex; gap: 1rem; align-items: center; flex-wrap: wrap; }
    .nav-info label { display: flex; align-items: center; gap: 0.5rem; }
    .nav-info select { padding: 0.3rem; border-radius: 4px; border: 1px solid #ddd; }
    .criteria-display { background: #f8f9fa; padding: 1rem; border-radius: 8px; border-left: 4px solid #3498db; }
    .criteria-display h4 { margin-bottom: 0.5rem; }
    .criteria-display p { color: #666; font-size: 0.9rem; margin-bottom: 0.5rem; }
    .score-badge { display: inline-block; background: #3498db; color: white; padding: 0.2rem 0.5rem; border-radius: 3px; margin-left: 0.5rem; }
    .loading { text-align: center; padding: 2rem; color: #666; }
    .btn-nav { padding: 0.4rem 0.8rem; font-size: 0.85rem; }
    .btn-save { background: #27ae60; }
    .btn-prev { background: #95a5a6; }
    .btn-next { background: #3498db; }
    .evaluation-form { background: white; padding: 1rem; border-radius: 8px; border: 1px solid #ddd; flex-shrink: 0; }
    .evaluation-form h4 { margin-bottom: 1rem; }
    .evaluation-form .form-group { margin-bottom: 0.75rem; }
    .evaluation-form label { display: block; margin-bottom: 0.3rem; font-weight: 500; font-size: 0.85rem; }
    .evaluation-form input, .evaluation-form textarea { width: 100%; padding: 0.5rem; border: 1px solid #ddd; border-radius: 4px; }
    .evaluation-form textarea { resize: vertical; font-size: 0.85rem; }
    .criteria-nav { display: flex; gap: 0.5rem; margin-top: 0.75rem; flex-wrap: wrap; }
    .position-info { background: #e8f4f8; padding: 0.5rem 1rem; border-radius: 4px; font-weight: 500; font-size: 0.9rem; }
    .total-score { font-size: 1.1rem; font-weight: bold; color: #27ae60; }
    .evaluated-badge { background: #27ae60; color: white; padding: 0.1rem 0.4rem; border-radius: 3px; font-size: 0.7rem; margin-right: 0.3rem; }
    .not-evaluated-badge { background: #95a5a6; color: white; padding: 0.1rem 0.4rem; border-radius: 3px; font-size: 0.7rem; margin-right: 0.3rem; }
    .exam-nav { display: flex; gap: 0.5rem; margin-top: 0.75rem; flex-wrap: wrap; }
    .summary-panel { background: white; padding: 1rem; border-radius: 8px; border: 1px solid #ddd; flex-shrink: 0; max-height: 200px; overflow-y: auto; }
    .summary-panel h4 { margin-bottom: 0.5rem; font-size: 0.95rem; }
    .summary-item { padding: 0.4rem; border-bottom: 1px solid #eee; font-size: 0.85rem; cursor: pointer; }
    .summary-item:hover { background: #f5f5f5; }
    .summary-item:last-child { border-bottom: none; }
    .criteria-name { font-weight: 600; color: #2c3e50; margin-bottom: 0.5rem; padding: 0.5rem; background: #ecf0f1; border-radius: 4px; }
</style>
{% endblock %}

{% block content %}
<div class="card" style="margin-bottom: 1rem;">
    <div class="nav-bar">
        <div>
            <h2 style="margin: 0;">Interactive Reviewer</h2>
        </div>
        <div class="nav-info">
            <label>
                Exam:
                <select id="exam-select" onchange="loadReviewerData()">
                    {% for exam in exam_files %}
                    <option value="{{ loop.index0 }}">{{ exam }}</option>
                    {% endfor %}
                </select>
            </label>
            <label>
                Criteria:
                <select id="criteria-file-select" onchange="loadReviewerData()">
                    {% for criteria in criteria_files %}
                    <option value="{{ criteria }}">{{ criteria }}</option>
                    {% endfor %}
                </select>
            </label>
            <span class="position-info" id="position-info">Loading...</span>
            <span class="total-score" id="total-score">0/0</span>
        </div>
    </div>
</div>

{% if error %}
<div class="card" style="background: #f8d7da;">
    <p>{{ error }}</p>
</div>
{% else %}
<div class="reviewer-layout">
    <div class="criteria-bar" id="criteria-bar"></div>
    
    <div class="main-content">
        <div class="code-section">
            <div class="code-panel">
                <div class="code-header">
                    <span>Exam Code</span>
                    <span style="color: #666; font-size: 0.85rem;">C</span>
                </div>
                <pre><code class="language-c" id="exam-code">Loading...</code></pre>
            </div>
        </div>
        
        <div class="right-section">
            <div class="evaluation-form">
                <h4>Edit Evaluation</h4>
                <div class="criteria-name" id="criteria-name">-</div>
                <form id="evaluation-form">
                    <div class="form-group">
                        <label>Maximum Score:</label>
                        <input type="text" id="max-score" readonly style="background: #f0f0f0;">
                    </div>
                    <div class="form-group">
                        <label>Awarded Score:</label>
                        <input type="number" id="awarded-score" step="0.1" min="0">
                    </div>
                    <div class="form-group">
                        <label>Justification:</label>
                        <textarea id="justification" rows="4" placeholder="Enter your evaluation justification..."></textarea>
                    </div>
                    
                    <div class="criteria-nav">
                        <button type="button" class="btn btn-save btn-nav" onclick="saveEvaluation()">Save</button>
                        <button type="button" class="btn btn-prev btn-nav" onclick="prevCriteria()">← Prev</button>
                        <button type="button" class="btn btn-next btn-nav" onclick="nextCriteria()">Next →</button>
                    </div>
                </form>
                
                <div class="exam-nav">
                    <button type="button" class="btn btn-nav" onclick="prevExam()">← Prev Exam</button>
                    <button type="button" class="btn btn-nav" onclick="nextExam()">Next Exam →</button>
                </div>
            </div>
            
            <div class="summary-panel">
                <h4>Summary</h4>
                <div id="summary-list"></div>
            </div>
        </div>
    </div>
</div>
{% endif %}

<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<script>
let currentData = null;
let currentCriteriaFile = null;
let allCriteriaFiles = [];

function highlightCode() {
    const codeElement = document.getElementById('exam-code');
    if (codeElement) {
        codeElement.removeAttribute('data-highlighted');
        hljs.highlightElement(codeElement);
    }
}

function loadAllCriteria() {
    return fetch('/api/criteria/list')
        .then(response => response.json())
        .then(data => {
            allCriteriaFiles = data.criteria || [];
            return allCriteriaFiles;
        });
}

function loadReviewerData() {
    const examIdx = document.getElementById('exam-select').value;
    const criteriaFile = document.getElementById('criteria-file-select').value;
    
    currentCriteriaFile = criteriaFile;
    
    if (!criteriaFile) {
        document.getElementById('criteria-bar').innerHTML = '<p>No criteria selected</p>';
        return;
    }
    
    document.getElementById('exam-code').textContent = 'Loading...';
    
    fetch(`/api/reviewer/data?exam_idx=${examIdx}&criteria_file=${encodeURIComponent(criteriaFile)}&criteria_idx=0`)
        .then(response => response.json())
        .then(data => {
            if (data.error) {
                alert(data.error);
                return;
            }
            currentData = data;
            renderData();
        })
        .catch(err => {
            console.error('Error loading data:', err);
            alert('Error loading data');
        });
}

function renderData() {
    if (!currentData) return;
    
    const codeElement = document.getElementById('exam-code');
    codeElement.textContent = currentData.exam_content;
    codeElement.className = 'language-c';
    codeElement.removeAttribute('data-highlighted');
    
    setTimeout(() => {
        hljs.highlightElement(codeElement);
    }, 0);
    
    document.getElementById('position-info').textContent = 
        `Exam ${currentData.exam_idx + 1}/${currentData.total_exams}`;
    
    document.getElementById('total-score').textContent = 
        `${currentData.review_data?.overall_score || 0}/${currentData.review_data?.maximum_possible_score || 0}`;
    
    renderCriteriaBar();
    renderCurrentCriteria();
    renderSummary();
}

function renderCriteriaBar() {
    if (!currentData || allCriteriaFiles.length === 0) return;
    
    const barContainer = document.getElementById('criteria-bar');
    let html = '';
    
    allCriteriaFiles.forEach((crit, idx) => {
        const isCurrent = crit.filename === currentData.criteria_file;
        
        let isEvaluated = false;
        let score = '';
        
        if (currentData.review_data && currentData.review_data.criteria_evaluations) {
            const evalItem = currentData.review_data.criteria_evaluations.find(e => e.criteria_filename === crit.filename);
            if (evalItem) {
                isEvaluated = true;
                score = ` (${evalItem.awarded_score}/${crit.nota_maxima})`;
            }
        }
        
        html += `
            <div class="criteria-bar-item ${isCurrent ? 'active' : ''}" 
                 onclick="selectCriteria('${crit.filename}')">
                <span class="${isEvaluated ? 'evaluated-badge' : 'not-evaluated-badge'}">${isEvaluated ? '✓' : '○'}</span>
                ${crit.titulo}${score}
            </div>
        `;
    });
    
    barContainer.innerHTML = html;
}

function selectCriteria(criteriaFile) {
    const examIdx = document.getElementById('exam-select').value;
    document.getElementById('criteria-file-select').value = criteriaFile;
    currentCriteriaFile = criteriaFile;
    
    fetch(`/api/reviewer/data?exam_idx=${examIdx}&criteria_file=${encodeURIComponent(criteriaFile)}&criteria_idx=0`)
        .then(response => response.json())
        .then(data => {
            if (data.error) {
                alert(data.error);
                return;
            }
            currentData = data;
            renderData();
        })
        .catch(err => {
            console.error('Error loading criteria:', err);
        });
}

function renderCurrentCriteria() {
    if (!currentData || !currentData.current_criteria) return;
    
    const criteria = currentData.current_criteria;
    const evaluation = currentData.current_evaluation;
    
    document.getElementById('criteria-name').textContent = criteria.titulo || 'Untitled Criteria';
    
    document.getElementById('max-score').value = criteria.nota_maxima || 0;
    
    if (evaluation) {
        document.getElementById('awarded-score').value = evaluation.awarded_score || 0;
        document.getElementById('justification').value = evaluation.justification || '';
    } else {
        document.getElementById('awarded-score').value = 0;
        document.getElementById('justification').value = '';
    }
}

function renderSummary() {
    if (!currentData || allCriteriaFiles.length === 0) return;
    
    const summaryContainer = document.getElementById('summary-list');
    let html = '';
    
    allCriteriaFiles.forEach(crit => {
        const isCurrent = crit.filename === currentData.criteria_file;
        
        let evalData = null;
        if (currentData.review_data && currentData.review_data.criteria_evaluations) {
            evalData = currentData.review_data.criteria_evaluations.find(e => e.criteria_filename === crit.filename);
        }
        
        const score = evalData ? `${evalData.awarded_score}/${crit.nota_maxima}` : `0/${crit.nota_maxima}`;
        const status = evalData ? '✓' : '○';
        const color = evalData ? '#27ae60' : '#95a5a6';
        const bgColor = isCurrent ? '#e8f4f8' : 'transparent';
        
        html += `
            <div class="summary-item" style="background: ${bgColor};" onclick="selectCriteria('${crit.filename}')">
                <span style="color: ${color};">${status}</span> 
                ${crit.titulo} - <strong>${score}</strong>
            </div>
        `;
    });
    
    summaryContainer.innerHTML = html;
}

function selectCriteriaByIndex(idx) {
    if (idx >= 0 && idx < allCriteriaFiles.length) {
        selectCriteria(allCriteriaFiles[idx].filename);
    }
}

function saveEvaluation() {
    if (!currentData) return;
    
    const criteria = currentData.current_criteria;
    const evaluation = {
        criteria_filename: currentData.criteria_file,
        criteria_title: criteria?.titulo || currentData.criteria_file,
        criteria_description: criteria?.descripcion || '',
        maximum_score: criteria?.nota_maxima || 0,
        awarded_score: parseFloat(document.getElementById('awarded-score').value) || 0,
        justification: document.getElementById('justification').value,
        subsection_evaluations: []
    };
    
    if (criteria?.subapartados) {
        criteria.subapartados.forEach(sub => {
            evaluation.subsection_evaluations.push({
                subsection_name: sub.nombre,
                subsection_description: sub.descripcion,
                possible_points: sub.puntos,
                awarded_points: 0,
                reasoning: ''
            });
        });
    }
    
    fetch('/api/reviewer/save-evaluation', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
            exam_file: currentData.exam_file,
            criteria_file: currentData.criteria_file,
            evaluation: evaluation
        })
    })
    .then(response => response.json())
    .then(data => {
        if (data.success) {
            alert('Saved!');
            loadReviewerData();
        } else {
            alert('Error: ' + data.message);
        }
    })
    .catch(err => console.error('Error saving:', err));
}

function nextCriteria() {
    if (!currentData) return;
    const criteriaSelect = document.getElementById('criteria-file-select');
    const options = criteriaSelect.options;
    const currentIdx = criteriaSelect.selectedIndex;
    
    if (currentIdx < options.length - 1) {
        criteriaSelect.selectedIndex = currentIdx + 1;
        loadReviewerData();
    } else {
        alert('Already at last criteria');
    }
}

function prevCriteria() {
    if (!currentData) return;
    const criteriaSelect = document.getElementById('criteria-file-select');
    const currentIdx = criteriaSelect.selectedIndex;
    
    if (currentIdx > 0) {
        criteriaSelect.selectedIndex = currentIdx - 1;
        loadReviewerData();
    } else {
        alert('Already at first criteria');
    }
}

function nextExam() {
    if (!currentData) return;
    if (currentData.exam_idx < currentData.total_exams - 1) {
        document.getElementById('exam-select').value = currentData.exam_idx + 1;
        loadReviewerData();
    } else {
        alert('Already at last exam');
    }
}

function prevExam() {
    if (!currentData) return;
    if (currentData.exam_idx > 0) {
        document.getElementById('exam-select').value = currentData.exam_idx - 1;
        loadReviewerData();
    } else {
        alert('Already at first exam');
    }
}

document.addEventListener('DOMContentLoaded', function() {
    loadAllCriteria().then(() => {
        loadReviewerData();
    });
});
</script>
{% endblock %}
